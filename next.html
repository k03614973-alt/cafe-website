<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available Rooms</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
}

header {
    background: black;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    width: 90%;
    margin: 30px auto;
}

.room {
    background: white;
    display: flex;
    margin-bottom: 20px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.room img {
    width: 250px;
    height: 180px;
    object-fit: cover;
}

.room-details {
    padding: 20px;
    flex: 1;
}

.room-details h2 {
    margin: 0;
}

.price {
    color: green;
    font-size: 18px;
    margin: 10px 0;
}

button {
    padding: 10px 20px;
    background: gold;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}
</style>
</head>

<body>

<header>
    <h1>Available Rooms</h1>
</header>

<div class="container">

    <div class="room">
        <img src="https://images.unsplash.com/photo-1566665797739-1674de7a421a">
        <div class="room-details">
            <h2>Deluxe Room</h2>
            <p>✔ Free WiFi ✔ AC ✔ Breakfast included</p>
            <div class="price">₹6,000 / night</div>
            <button onclick="bookRoom('Deluxe Room')">Book Now</button>
        </div>
    </div>

    <div class="room">
        <img src="https://images.unsplash.com/photo-1584132967334-10e028bd69f7">
        <div class="room-details">
            <h2>Executive Suite</h2>
            <p>✔ King Bed ✔ Pool View ✔ Free Dinner</p>
            <div class="price">₹9,000 / night</div>
            <button onclick="bookRoom('Executive Suite')">Book Now</button>
        </div>
    </div>

    <div class="room">
        <img src="https://images.unsplash.com/photo-1591088398332-8a7791972843">
        <div class="room-details">
            <h2>Presidential Suite</h2>
            <p>✔ Luxury Stay ✔ Private Lounge ✔ Butler Service</p>
            <div class="price">₹15,000 / night</div>
            <button onclick="bookRoom('Presidential Suite')">Book Now</button>
        </div>
    </div>

</div>

<script>
function bookRoom(roomName) {
    alert("You selected: " + roomName);
    window.location.href = "payment.html"; // next page
}
</script>

</body>
</html>
